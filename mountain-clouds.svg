<svg width="1200" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pixel mountain landscape with moving clouds">
  <style>
    .cloud1 { animation: drift1 18s linear infinite; }
    .cloud2 { animation: drift2 24s linear infinite; }
    .cloud3 { animation: drift3 30s linear infinite; }
    .glow { animation: pulse 3s ease-in-out infinite; }
    @keyframes drift1 { from { transform: translateX(-160px); } to { transform: translateX(1240px); } }
    @keyframes drift2 { from { transform: translateX(1180px); } to { transform: translateX(-260px); } }
    @keyframes drift3 { from { transform: translateX(-420px); } to { transform: translateX(1000px); } }
    @keyframes pulse { 0%,100% { opacity: .65; } 50% { opacity: 1; } }
    .px { shape-rendering: crispEdges; }
  </style>

  <rect class="px" width="1200" height="280" fill="#0b1020"/>
  <rect class="px" y="0" width="1200" height="70" fill="#172554"/>
  <rect class="px" y="70" width="1200" height="70" fill="#1e3a8a"/>
  <rect class="px" y="140" width="1200" height="80" fill="#334155"/>

  <g class="glow px">
    <rect x="940" y="42" width="28" height="28" fill="#fde68a"/>
    <rect x="932" y="50" width="44" height="12" fill="#facc15" opacity=".35"/>
    <rect x="948" y="34" width="12" height="44" fill="#facc15" opacity=".25"/>
  </g>

  <g class="cloud1 px" opacity=".9">
    <rect x="0" y="56" width="52" height="14" fill="#dbeafe"/>
    <rect x="16" y="42" width="38" height="14" fill="#eff6ff"/>
    <rect x="54" y="56" width="72" height="14" fill="#bfdbfe"/>
  </g>

  <g class="cloud2 px" opacity=".75">
    <rect x="0" y="96" width="80" height="12" fill="#dbeafe"/>
    <rect x="20" y="82" width="46" height="14" fill="#eff6ff"/>
    <rect x="80" y="96" width="54" height="12" fill="#bfdbfe"/>
  </g>

  <g class="cloud3 px" opacity=".55">
    <rect x="0" y="128" width="110" height="10" fill="#bfdbfe"/>
    <rect x="36" y="116" width="40" height="12" fill="#dbeafe"/>
  </g>

  <polygon class="px" points="0,230 150,110 300,230" fill="#1e293b"/>
  <polygon class="px" points="90,230 330,70 570,230" fill="#26364d"/>
  <polygon class="px" points="420,230 620,95 820,230" fill="#1e293b"/>
  <polygon class="px" points="680,230 930,72 1180,230" fill="#26364d"/>
  <polygon class="px" points="930,72 880,135 980,130" fill="#e2e8f0"/>
  <polygon class="px" points="330,70 282,135 372,130" fill="#e2e8f0"/>
  <polygon class="px" points="620,95 582,145 657,140" fill="#cbd5e1"/>

  <rect class="px" y="218" width="1200" height="62" fill="#0f172a"/>
  <rect class="px" y="236" width="1200" height="44" fill="#020617"/>

  <g class="px">
    <rect x="85" y="190" width="18" height="46" fill="#14532d"/>
    <rect x="65" y="202" width="58" height="12" fill="#166534"/>
    <rect x="72" y="184" width="44" height="12" fill="#15803d"/>
    <rect x="970" y="188" width="18" height="48" fill="#14532d"/>
    <rect x="950" y="202" width="58" height="12" fill="#166534"/>
    <rect x="957" y="184" width="44" height="12" fill="#15803d"/>
    <rect x="1060" y="202" width="16" height="34" fill="#14532d"/>
    <rect x="1044" y="214" width="48" height="10" fill="#166534"/>
  </g>

  <text x="60" y="264" fill="#93c5fd" font-family="monospace" font-size="18">backend systems • agentic ai • production infrastructure</text>
</svg>
