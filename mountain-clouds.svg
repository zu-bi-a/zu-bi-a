<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" style="background-color: #5da2d5; shape-rendering: crispEdges;">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&amp;display=swap');
      
      .pixel-text {
        font-family: 'Press Start 2P', monospace;
        font-size: 38px;
        fill: #ffffff;
        stroke: #1d2b53;
        stroke-width: 4px;
        paint-order: stroke fill;
        text-anchor: middle;
        animation: textBob 3s ease-in-out infinite;
      }

      /* Cloud Layer 1 - Slow/Distant */
      .cloud-bg {
        animation: moveLeftToRight 50s linear infinite;
      }

      /* Cloud Layer 2 - Faster/Closer */
      .cloud-fg {
        animation: moveLeftToRight 30s linear infinite;
      }

      @keyframes textBob {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-8px); }
      }

      @keyframes moveLeftToRight {
        0% { transform: translateX(-400px); }
        100% { transform: translateX(1200px); }
      }
    </style>

    <g id="pixel-cloud-a">
      <path d="M 40,20 h 40 v -10 h 40 v 10 h 20 v 10 h 20 v 20 h -120 v -10 h -20 v -10 z" fill="#ffffff"/>
      <path d="M 20,30 h 20 v 10 h -20 z M 120,30 h 20 v 10 h -20 z" fill="#e0ecf8"/>
    </g>

    <g id="pixel-cloud-b">
      <path d="M 20,20 h 20 v -10 h 40 v 10 h 40 v 10 h 20 v 10 h -120 v -10 z" fill="#ffffff"/>
    </g>
  </defs>

  <g class="cloud-bg" opacity="0.6">
    <use href="#pixel-cloud-a" x="100" y="20" transform="scale(1.5)" />
    <use href="#pixel-cloud-b" x="500" y="40" transform="scale(1.2)" />
    <use href="#pixel-cloud-a" x="900" y="10" transform="scale(1.3)" />
  </g>

  <g fill="#2b5c8f">
    <path d="M -50,280 L 150,110 L 350,280 Z" />
    <path d="M 200,280 L 450,80 L 700,280 Z" />
    <path d="M 600,280 L 820,120 L 1040,280 Z" />
    <path d="M 850,280 L 1100,90 L 1350,280 Z" />
  </g>

  <g fill="#417c72">
    <path d="M 50,280 L 280,140 L 510,280 Z" />
    <path d="M 450,280 L 680,130 L 910,280 Z" />
    <path d="M -10,240 h 200 v 10 h 150 v -10 h 300 v 20 h 250 v -10 h 350 v 50 h -1250 z" />
  </g>

  <g class="cloud-fg">
    <use href="#pixel-cloud-b" x="50" y="80" transform="scale(1.8)" />
    <use href="#pixel-cloud-a" x="650" y="70" transform="scale(2)" />
  </g>

  <g fill="#1a4346">
    <path d="M -10,260 q 150,-20 400,0 q 300,30 500,-10 q 200,-10 320,20 L 1210,290 L -10,290 Z" />
    
    <path d="M 40,260 h 6 v -10 h -4 v -6 h 2 v -6 h -2 v -6 h -2 v 6 h -2 v 6 h 2 v 6 h -2 z" />
    <path d="M 70,255 h 8 v -12 h -5 v -8 h 3 v -8 h -3 v -6 h -2 v 6 h -3 v 8 h 3 v 8 h -4 z" />
    
    <path d="M 1100,250 h 8 v -12 h -5 v -8 h 3 v -8 h -3 v -6 h -2 v 6 h -3 v 8 h 3 v 8 h -4 z" />
    <path d="M 1140,255 h 6 v -10 h -4 v -6 h 2 v -6 h -2 v -6 h -2 v 6 h -2 v 6 h 2 v 6 h -2 z" />
  </g>

  <g transform="translate(600, 140)">
    <text x="0" y="10" class="pixel-text">ZUBIA NASIR</text>
  </g>

  <rect x="0" y="0" width="1200" height="280" fill="none" stroke="#1d2b53" stroke-width="12" />
  <rect x="6" y="6" width="1188" height="268" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.3" />
</svg>
